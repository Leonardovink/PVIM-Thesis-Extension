model_opts:
  model: PVIM
  obs_input_type: [local_box, pose, box, PVI, speed]
  apply_class_weights: True
  normalize_boxes: True
  generator: True
  time_to_event: 120  # fixed integer — 1 sample per pedestrian at exactly 4s before event
net_opts:
  num_hidden_units: 256
  global_pooling: avg
  regularizer_val: 0.0001
  cell_type: gru
  backbone: c3d
data_opts:
  images_path: "VIDEOS"
