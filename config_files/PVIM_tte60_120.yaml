model_opts:
  model: PVIM
  obs_input_type: [local_box, pose, box, PVI, speed]
  apply_class_weights: True
  normalize_boxes: True
  generator: True
  time_to_event: [60, 120]   # 2-4 second prediction horizon (combined)
net_opts:
  num_hidden_units: 256
  global_pooling: avg
  regularizer_val: 0.0001
  cell_type: gru
  backbone: c3d
data_opts:
  images_path: "VIDEOS"
exp_opts:
  datasets: [pie]
  batch_size: [8, 8, 8]
  epochs: [80, 20, 20]
  lr: [1.0e-06, 5.0e-05, 5.0e-05]
